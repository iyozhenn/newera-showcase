<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edit Product — NEW ERA</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;600&display=swap" rel="stylesheet">

<style>

:root{
  --black:#0a0a0a;
  --dark:#111;
  --card:#161616;
  --border:#2a2a2a;
  --gold:#c9a84c;
  --gold-lt:#e8c96a;
  --white:#f0ece4;
  --muted:#777;
  --display:'Bebas Neue',sans-serif;
  --body:'Barlow',sans-serif;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:var(--black);
  color:var(--white);
  font-family:var(--body);
}

header{
  border-bottom:1px solid var(--border);
  background:rgba(10,10,10,.95);
}

.nav{
  max-width:1100px;
  margin:auto;
  height:64px;
  padding:0 2rem;
  display:flex;
  align-items:center;
  justify-content:space-between;
}

.logo{
  text-decoration:none;
  color:var(--white);
  font-family:var(--display);
  font-size:1.5rem;
}

.logo span{
  color:var(--gold);
}

.wrap{
  max-width:900px;
  margin:auto;
  padding:4rem 2rem;
}

.top{
  color:var(--gold);
  letter-spacing:.2em;
  text-transform:uppercase;
  font-size:.7rem;
  margin-bottom:1rem;
}

h1{
  font-family:var(--display);
  font-size:4rem;
  margin-bottom:2rem;
}

.card{
  background:var(--card);
  border:1px solid var(--border);
  padding:2rem;
}

form{
  display:flex;
  flex-direction:column;
  gap:1rem;
}

input,
textarea,
select{
  width:100%;
  background:#0f0f0f;
  border:1px solid var(--border);
  color:var(--white);
  padding:1rem;
  outline:none;
  font-family:var(--body);
}

textarea{
  min-height:140px;
  resize:none;
}

.preview{
  width:100%;
  max-height:350px;
  object-fit:cover;
  border:1px solid var(--border);
}

.actions{
  display:flex;
  gap:1rem;
}

.save{
  flex:1;
  border:none;
  background:var(--gold);
  color:#000;
  padding:1rem;
  font-weight:600;
  cursor:pointer;
}

.save:hover{
  background:var(--gold-lt);
}

.back{
  text-decoration:none;
  border:1px solid var(--border);
  color:var(--white);
  padding:1rem 1.5rem;
}
.popup-overlay{
  position:fixed;
  inset:0;

  background:rgba(0,0,0,.75);

  display:flex;
  align-items:center;
  justify-content:center;

  opacity:0;
  pointer-events:none;

  transition:.25s;
  z-index:999;
}

.popup-overlay.show{
  opacity:1;
  pointer-events:auto;
}

.popup-box{
  width:420px;
  max-width:90%;

  background:var(--card);
  border:1px solid var(--border);

  padding:2rem;
  text-align:center;
}

.popup-box h3{
  font-family:var(--display);
  font-size:2rem;

  margin-bottom:.75rem;
}

.popup-box p{
  color:var(--muted);
  margin-bottom:2rem;
}

.popup-actions{
  display:flex;
}

.popup-confirm{
  width:100%;

  border:none;

  background:var(--gold);
  color:#000;

  padding:1rem;

  font-weight:600;
  cursor:pointer;
}

.popup-confirm:hover{
  background:var(--gold-lt);
}

</style>
</head>
<body>

<header>
  <div class="nav">
    <a href="../index.html" class="logo">
      NEW <span>ERA</span>®
    </a>
  </div>
</header>

<section class="wrap">

<p class="top">Admin Dashboard</p>

<h1>EDIT PRODUCT.</h1>

<div class="card">

<form id="edit-form">

<img id="preview" class="preview">

<input id="name" required placeholder="Product Name">

<select id="category" required>
  <option>Headwear</option>
  <option>Tops</option>
  <option>Bottoms</option>
  <option>Bags</option>
</select>

<input id="subcategory" placeholder="Subcategory">

<input
  id="price"
  type="number"
  min="0"
  step="0.01"
  placeholder="Price"
  required
>
<input id="badge" placeholder="Badge">
<input id="sizes" placeholder="Sizes">
<input id="colors" placeholder="Colors">
<input id="image" placeholder="Image URL" required>

<textarea
  id="description"
  placeholder="Description"
></textarea>

<div class="actions">
  <button class="save" type="submit">
    Save Changes
  </button>

  <a class="back" href="index.html">
    Back
  </a>
</div>

</form>

</div>
</section>

<script type="module">

import { db }
from "../js/firebase-config.js";

import {
  doc,
  getDoc,
  updateDoc
}
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const params =
  new URLSearchParams(window.location.search);

  const id =
  params.get("id");

  const form =
  document.getElementById("edit-form");

  const preview =
  document.getElementById("preview");

  const nameInput =
  document.getElementById("name");

  const categoryInput =
  document.getElementById("category");

  const subcategoryInput =
  document.getElementById("subcategory");

  const priceInput =
  document.getElementById("price");

  const badgeInput =
  document.getElementById("badge");

  const sizesInput =
  document.getElementById("sizes");

  const colorsInput =
  document.getElementById("colors");

  const imageInput =
  document.getElementById("image");

  const descriptionInput =
  document.getElementById("description");

  // POPUP CONSTANTS
  const popup =
  document.getElementById("popup");

  const popupTitle =
  document.getElementById("popup-title");

  const popupText =
  document.getElementById("popup-text");

  const popupClose =
  document.getElementById("popup-close");

  function showPopup(title,message,callback){
    popupTitle.textContent = title;

    popupText.textContent = message;

    popup.classList.add("show");

    popupClose.onclick = () => {
      popup.classList.remove("show");
      if(callback){
        callback();
      }
    };
  }

async function loadProduct(){

  const ref =
    doc(db,"products",id);

  const snap =
    await getDoc(ref);

  if(!snap.exists()){
    showPopup(
      "Product Not Found",
      "The selected product does not exist or may have been deleted.",
      () => location.href = "index.html");
      
    return;
  }

  const p = snap.data();
  
  console.log(p);

  nameInput.value = p.name || "";
  categoryInput.value = p.category || "";
  subcategoryInput.value = p.subcategory || "";
  priceInput.value =
  p.price != null
    ? Number(p.price).toFixed(2)
    : "";
  badgeInput.value = p.badge || "";
  sizesInput.value = (p.sizes || []).join(",");
  colorsInput.value = (p.colors || []).join(",");  
  imageInput.value = p.image || "";
  descriptionInput.value = p.description || "";
  
  preview.src = p.image || "";
}

imageInput.addEventListener("input", () => {
  preview.src = imageInput.value;
});

form.addEventListener("submit", async e => {

  e.preventDefault();

  await updateDoc(
  doc(db,"products",id),
  {
    name: nameInput.value,
    category: categoryInput.value,
    subcategory: subcategoryInput.value,
    price: priceInput.value? Number(priceInput.value): 0,
    badge: badgeInput.value || null,
    sizes: sizesInput.value
      .split(",")
      .map(s => s.trim()),

    colors: colorsInput.value
      .split(",")
      .map(c => c.trim()),

    image: imageInput.value,
    description: descriptionInput.value
  }
);

  showPopup(
    "Success!",
    "Product updated successfully.",
    () => location.href = "index.html"
  );
});

loadProduct();

</script>
<div id="popup" class="popup-overlay">
  <div class="popup-box">

    <h3 id="popup-title">
      Success
    </h3>

    <p id="popup-text">
      Product updated successfully.
    </p>

    <div class="popup-actions">

      <button
        id="popup-close"
        class="popup-confirm"
      >
        Return to Dashboard
      </button>

    </div>
  </div>

</div>
</body>
</html>
