<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login — NEW ERA</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link
    href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;500;600&display=swap"
    rel="stylesheet"
  >

  <style>

    :root{
      --black:#0a0a0a;
      --card:#161616;
      --border:#2a2a2a;

      --gold:#c9a84c;
      --gold-light:#e4c86e;

      --white:#f0ece4;
      --muted:#777;

      --display:'Bebas Neue', sans-serif;
      --body:'Barlow', sans-serif;
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      min-height:100vh;

      background:var(--black);
      color:var(--white);

      font-family:var(--body);

      display:flex;
      align-items:center;
      justify-content:center;

      padding:2rem;
    }

    .card{
      width:100%;
      max-width:420px;

      background:var(--card);

      border:1px solid var(--border);

      padding:3rem 2rem;

      position:relative;
    }

    .top{
      color:var(--gold);

      text-transform:uppercase;
      letter-spacing:.2em;
      font-size:.7rem;

      margin-bottom:1rem;
    }

    h1{
      font-family:var(--display);
      font-size:4rem;
      line-height:1;

      margin-bottom:2rem;
    }

    form{
      display:flex;
      flex-direction:column;
      gap:1rem;

      margin-bottom:1rem;
    }

    input{
      width:100%;

      background:#0f0f0f;

      border:1px solid var(--border);

      color:var(--white);

      padding:1rem;

      outline:none;

      font-family:var(--body);
    }

    button{
      border:none;

      background:var(--gold);
      color:#000;

      padding:1rem;

      font-weight:600;

      cursor:pointer;

      transition:.2s;
    }

    button:hover{
      background:var(--gold-light);
    }

    .back{
      display:block;

      text-align:center;

      margin-top:2rem;

      color:var(--gold);

      text-decoration:none;

      font-size:.9rem;

      transition:.2s;
    }

    .back:hover{
      color:var(--gold-light);
    }

    .error{
      color:#ff7070;
      font-size:.9rem;
      margin-top:1rem;
      text-align:center;
    }

    @media(max-width:500px){

      h1{
        font-size:3rem;
      }

      .card{
        padding:2rem 1.5rem;
      }
    }

  </style>
</head>
<body>

  <div class="card">

    <p class="top">
      Restricted Access
    </p>

    <h1>
      ADMIN LOGIN.
    </h1>

    <form id="login-form">

      <input
        type="email"
        id="email"
        placeholder="Admin Email"
        required
      >

      <input
        type="password"
        id="password"
        placeholder="Password"
        required
      >

      <button type="submit" id="login-btn">
        Login
      </button>

    </form>

    <a href="../index.html" class="back">
      ← Back to Website
    </a>

    <p class="error" id="error"></p>

  </div>

<script type="module">

  import { auth }
  from "../js/firebase-config.js";

  import {
    signInWithEmailAndPassword,
    onAuthStateChanged
  }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  const form =
    document.getElementById("login-form");

  const error =
    document.getElementById("error");

  const loginBtn =
    document.getElementById("login-btn");

  // already logged in
  onAuthStateChanged(auth, (user) => {

  if(user){

    window.location.replace(
      "index.html"
    );

  }

});

  // login
  form.addEventListener("submit", async (e) => {

    e.preventDefault();

    const email =
      document.getElementById("email").value;

    const password =
      document.getElementById("password").value;

    try{

      loginBtn.innerText = "Logging in...";

      await signInWithEmailAndPassword(
        auth,
        email,
        password
      );

      // mark that this session just logged in
      localStorage.setItem(
        "justLoggedIn", 
        "true"
      );

      window.location.replace(
        "index.html"
      );

    } catch(err){

      error.innerText =
        "Invalid email or password.";

      loginBtn.innerText = "Login";

      console.error(err);
    }

  });

</script>

</body>
</html>
